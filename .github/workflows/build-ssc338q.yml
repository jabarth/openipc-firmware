name: Build SSC338Q Firmware

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential git wget cpio unzip rsync bc python3 python3-pip libncurses5-dev libssl-dev device-tree-compiler u-boot-tools xz-utils

    - name: Build Firmware
      run: make BOARD=ssc338q_ultimate all

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openipc-waybeam-firmware
        path: |
          output/images/openipc*.tgz

