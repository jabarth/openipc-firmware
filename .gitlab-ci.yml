image: amd64/ubuntu:22.04

variables:
  DEBIAN_FRONTEND: noninteractive

stages:
  - build

build-firmware:
  stage: build
  before_script:
    - dpkg --add-architecture amd64
    - sed -i 's/^deb /deb [arch=arm64] /g' /etc/apt/sources.list
    - |
      cat <<EOF >> /etc/apt/sources.list
      deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy main restricted universe multiverse
      deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-updates main restricted universe multiverse
      deb [arch=amd64] http://archive.ubuntu.com/ubuntu jammy-security main restricted universe multiverse
      EOF
    - apt-get update
    - apt-get install -y build-essential git wget cpio unzip rsync bc python3 python3-pip libncurses5-dev libssl-dev device-tree-compiler u-boot-tools xz-utils file libc6:amd64 libstdc++6:amd64 zlib1g:amd64
  script:
    - echo "Starting OpenIPC Firmware Build..."
    - make BOARD=ssc338q_ultimate all
    - mkdir -p output_firmware
    - cp output/images/rootfs.squashfs output_firmware/ || true
    - cp output/images/uImage output_firmware/ || true
    - cp output/images/autoupdate-kernel.img output_firmware/ || true
    - cp output/images/autoupdate-rootfs.img output_firmware/ || true
  artifacts:
    name: "openipc-waybeam-firmware-$CI_COMMIT_SHORT_SHA"
    paths:
      - output_firmware/
    expire_in: 1 week
